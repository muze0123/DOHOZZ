<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DOHOZZ - 精准达人营销，智能决策驱动社媒电商增长">
    <title>登录 - DOHOZZ 达人营销智能决策与管理平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-left">
            <div class="brand-content">
                <div class="logo-container">
                    <img src="Images/DOHOZZ_LOOGO.png" alt="DOHOZZ Logo" class="brand-logo">
                    <h1 class="brand-name">DOHOZZ</h1>
                </div>
                <p class="brand-slogan">精准达人营销，智能决策驱动社媒电商增长</p>
                <div class="brand-features">
                    <div class="feature-item">
                        <div class="feature-icon">🎯</div>
                        <div class="feature-text">
                            <h3>精准匹配</h3>
                            <p>AI驱动达人智能匹配，精准定位目标受众</p>
                        </div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">📊</div>
                        <div class="feature-text">
                            <h3>数据洞察</h3>
                            <p>多平台数据整合分析，洞察营销趋势</p>
                        </div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">🚀</div>
                        <div class="feature-text">
                            <h3>高效管理</h3>
                            <p>一站式管理多平台达人合作流程</p>
                        </div>
                    </div>
                </div>
                <div class="platforms-supported">
                    <span class="platform-label">支持平台：</span>
                    <div class="platform-icons">
                        <div class="platform-icon" title="TikTok">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/></svg>
                        </div>
                        <div class="platform-icon" title="Instagram">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
                        </div>
                        <div class="platform-icon" title="Shopee">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.006 4.295c-1.61 0-3.145.55-4.332 1.45l-.247.194c-.617.475-1.118 1.07-1.49 1.747-.37.676-.563 1.43-.563 2.23 0 .78.18 1.54.527 2.2.347.66.837 1.22 1.44 1.64l.16.11c.35.24.74.41 1.16.51.42.1.85.15 1.29.15h2.9c.75 0 1.47-.12 2.13-.36.66-.24 1.25-.58 1.75-1.01l.03-.02c.47-.42.85-.93 1.11-1.51.27-.58.41-1.22.41-1.89 0-.67-.14-1.3-.41-1.89-.27-.58-.64-1.09-1.11-1.51l-.03-.02c-.5-.43-1.09-.77-1.75-1.01-.66-.24-1.38-.36-2.13-.36H13.4l-.63-1.06-.64 1.06h-2.9l-.55-.39c-.5-.35-1.05-.63-1.65-.82-.6-.19-1.24-.29-1.9-.29-.55 0-1.1.08-1.62.23-.53.15-1.02.38-1.45.68l-.13.09c-.39.29-.73.64-1.01 1.05-.28.41-.43.87-.43 1.36 0 .49.15.95.43 1.36.28.41.62.76 1.01 1.05l.13.09c.43.3.92.53 1.45.68.52.15 1.07.23 1.62.23.66 0 1.3-.1 1.9-.29.6-.19 1.15-.47 1.65-.82l.55-.39h3.79l.63 1.06.64-1.06h2.27c1.08 0 2.1.28 2.98.79.88.51 1.58 1.24 2.04 2.13.46.89.7 1.91.7 2.98 0 1.07-.24 2.09-.7 2.98-.46.89-1.16 1.62-2.04 2.13-.88.51-1.9.79-2.98.79h-7.27c-.82 0-1.61.16-2.33.46-.73.3-1.37.74-1.91 1.29-.54.55-.96 1.21-1.24 1.95-.28.74-.42 1.55-.42 2.39 0 .84.14 1.65.42 2.39.28.74.7 1.4 1.24 1.95.54.55 1.18.99 1.91 1.29.72.3 1.51.46 2.33.46h7.27c1.64 0 3.19-.34 4.56-.98 1.37-.64 2.52-1.54 3.37-2.63.85-1.09 1.38-2.38 1.53-3.79.15-1.41-.05-2.83-.58-4.14-.53-1.31-1.38-2.43-2.48-3.28-1.1-.85-2.4-1.38-3.81-1.53-1.41-.15-2.83.05-4.14.58-1.31.53-2.43 1.38-3.28 2.48l-.16.21-.24-.33z"/></svg>
                        </div>
                        <div class="platform-icon" title="Lazada">
                            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.91 6.18c-.02-.39-.35-.7-.74-.7H2.83c-.39 0-.72.31-.74.7l-.99 14.64c-.02.39.27.71.66.71h18.68c.39 0 .68-.32.66-.71l-.09-14.64zm-8.84 6.1l-3.4 3.4H3.7l4.37-5.58 3.4 3.4 1.4-1.4-3.4-3.4 2.86-3.72c.18-.23.5-.3.74-.15l3.02 1.87 2.45-3.17c.16-.2.46-.24.68-.1l2.6 1.63c.22.14.29.42.16.64l-2.9 4.83-2.45 3.17c-.16.2-.46.24-.68.1l-2.61-1.63c-.22-.14-.29-.42-.16-.64l.86-1.42-1.4 1.4-1.42.86z"/></svg>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="login-right">
            <div class="login-form-container">
                <div class="login-header">
                    <h2>欢迎回来</h2>
                    <p>登录您的 DOHOZZ 账户继续探索达人营销智能解决方案</p>
                </div>

                <form id="loginForm" class="login-form" novalidate>
                    <div class="form-group">
                        <label for="email">用户名 / 邮箱</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                            <input type="text" id="email" name="email" placeholder="请输入用户名或邮箱地址" autocomplete="username" required>
                            <div class="validation-icon"></div>
                        </div>
                        <span class="error-message" id="emailError"></span>
                    </div>

                    <div class="form-group">
                        <label for="password">密码</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                            </svg>
                            <input type="password" id="password" name="password" placeholder="请输入密码" autocomplete="current-password" required>
                            <button type="button" class="toggle-password" id="togglePassword" aria-label="切换密码可见性">
                                <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                    <line x1="1" y1="1" x2="23" y2="23"></line>
                                </svg>
                            </button>
                            <div class="validation-icon"></div>
                        </div>
                        <span class="error-message" id="passwordError"></span>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-wrapper">
                            <input type="checkbox" id="rememberMe" name="rememberMe">
                            <span class="checkmark"></span>
                            <span class="checkbox-label">记住我</span>
                        </label>
                        <a href="#" class="forgot-password" id="forgotPasswordLink">忘记密码？</a>
                    </div>

                    <div class="captcha-container" id="captchaContainer">
                        <div class="captcha-wrapper">
                            <div class="captcha-question" id="captchaQuestion"></div>
                            <input type="text" id="captchaInput" class="captcha-input" placeholder="请输入答案" autocomplete="off">
                        </div>
                        <button type="button" class="refresh-captcha" id="refreshCaptcha" aria-label="刷新验证码">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="23 4 23 10 17 10"></polyline>
                                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                            </svg>
                        </button>
                        <span class="error-message" id="captchaError"></span>
                    </div>

                    <button type="submit" class="login-button" id="loginButton">
                        <span class="button-text">登录</span>
                        <span class="button-loader"></span>
                    </button>
                </form>

                <div class="divider">
                    <span>或</span>
                </div>

                <div class="social-login">
                    <button type="button" class="social-button google" id="googleLogin">
                        <svg viewBox="0 0 24 24" class="social-icon">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        <span>使用 Google 登录</span>
                    </button>
                    <button type="button" class="social-button facebook" id="facebookLogin">
                        <svg viewBox="0 0 24 24" class="social-icon">
                            <path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
                        </svg>
                        <span>使用 Facebook 登录</span>
                    </button>
                </div>

                <div class="register-prompt">
                    <span>还没有账户？</span>
                    <a href="#" id="registerLink">立即注册</a>
                </div>
            </div>
        </div>
    </div>

    <div class="notification-container" id="notificationContainer"></div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="passwordResetModal">
            <div class="modal-header">
                <h3>找回密码</h3>
                <button type="button" class="modal-close" id="closeModal" aria-label="关闭">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <p>请输入您的注册邮箱，我们将向您发送密码重置链接。</p>
                <div class="form-group">
                    <label for="resetEmail">邮箱地址</label>
                    <input type="email" id="resetEmail" placeholder="请输入注册邮箱">
                    <span class="error-message" id="resetEmailError"></span>
                </div>
                <button type="button" class="reset-button" id="sendResetLink">发送重置链接</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
